<section>
  <language-selector />
</section>
<section class="p-4">
  <a
    title="Magic AI Blocks"
    class="hover:link hover:text-sky-400"
    href="https://www.material-tailwind.com/magic-ai"
    target="_blank"
    >Generated with <b class="underline">Magic AI Blocks</b> by Creative Tim</a
  >. <br />
  <br />

  <div
    class="relative flex h-full min-h-78.5 w-full flex-col items-center justify-center rounded-xl bg-gray-900! bg-clip-border px-8 text-gray-700"
  >
    <div class="container mx-auto text-center">
      <h2
        class="mb-4 block font-sans text-4xl leading-[1.3] font-semibold tracking-normal text-white antialiased"
      >
        Pricing
      </h2>
      <p
        class="mb-8 block font-sans text-xl leading-relaxed font-normal text-white antialiased opacity-70"
      >
        Choose the perfect plan for your dining experience
      </p>
    </div>
  </div>
  <div class="-mt-16 px-10 pt-8 pb-16 lg:px-30 xl:px-40">
    <div class="grid gap-8">
      <div
        class="relative z-10 flex translate-y-0 flex-col rounded-xl bg-white bg-clip-border text-gray-700 shadow-md lg:h-max lg:scale-105"
      >
        <div class="p-6 text-center">
          <h5
            class="mt-2 mb-2 flex justify-center font-sans text-xl leading-snug font-semibold tracking-normal text-green-500 antialiased"
          >
            Basic Plan
          </h5>
          <h3
            class="text-blue-gray-900 mt-5 mb-2 flex justify-center font-sans text-3xl leading-snug font-semibold tracking-normal antialiased"
          >
            $9.99<span
              class="text-blue-gray-900 block -translate-y-1 self-end font-sans text-xl leading-snug font-semibold tracking-normal antialiased"
              >/per month</span
            >
          </h3>
          <ul
            class="mt-2 mb-5 flex flex-col items-center justify-start gap-3 pt-6"
          >
            <div class="">
              <li class="flex items-center gap-2 py-1 text-gray-700">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="2"
                  stroke="currentColor"
                  aria-hidden="true"
                  class="h-5 w-5 text-inherit"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M4.5 12.75l6 6 9-13.5"
                  ></path>
                </svg>
                <p
                  class="block font-sans text-base leading-relaxed font-normal text-inherit antialiased"
                >
                  Online ordering
                </p>
              </li>
              <li class="flex items-center gap-2 py-1 text-gray-700">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="2"
                  stroke="currentColor"
                  aria-hidden="true"
                  class="h-5 w-5 text-inherit"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M4.5 12.75l6 6 9-13.5"
                  ></path>
                </svg>
                <p
                  class="block font-sans text-base leading-relaxed font-normal text-inherit antialiased"
                >
                  Limited support
                </p>
              </li>
            </div>
          </ul>
          <button
            title="Volver a productos"
            [routerLink]="'/products'"
            class="flex w-full items-center justify-center gap-4 rounded-lg bg-gray-900 px-6 py-3 text-center align-middle font-sans text-xs font-bold text-white uppercase shadow-md shadow-gray-900/10 transition-all select-none hover:shadow-lg hover:shadow-gray-900/20 focus:opacity-[0.85] focus:shadow-none active:opacity-[0.85] active:shadow-none disabled:pointer-events-none disabled:opacity-50 disabled:shadow-none"
            type="button"
          >
            join
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="2"
              stroke="currentColor"
              aria-hidden="true"
              class="h-5 w-5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"
              ></path>
            </svg>
          </button>
        </div>
      </div>
      <div
        class="relative z-10 flex translate-y-0 flex-col rounded-xl bg-white bg-clip-border text-gray-700 shadow-md lg:h-max lg:scale-105"
      ></div>
    </div>
  </div>
</section>
